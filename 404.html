<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found · Planet Holidays</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="images/planet_holidays_logo.webp">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .error-page__code{font-family:var(--f-display);font-size:clamp(8rem,20vw,18rem);font-weight:300;line-height:1;letter-spacing:-.04em;background:linear-gradient(135deg,#0a4a6e,#0f9b8e,#c8a868);background-clip:text;-webkit-background-clip:text;color:transparent}
    .error-page__title{font-family:var(--f-display);font-size:clamp(1.4rem,3vw,2.2rem);font-weight:300;margin:1.5rem 0 1rem;color:var(--c-text-dim)}
    .error-page__desc{font-size:.95rem;color:var(--c-text-muted);max-width:420px;margin-bottom:2.5rem;line-height:1.6}
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="header is-scrolled" id="header">
    <a href="index.html" class="header__logo">
      <img class="header__logo-img" src="images/planet_holidays_logo.webp" alt="Planet Holidays" height="40">
    </a>
    <nav class="header__nav">
      <a href="destinations.html" class="header__link">Destinations</a>
      <a href="about.html" class="header__link">About</a>
      <a href="contact.html" class="header__link">Contact</a>
    </nav>
  </header>

  <main class="error-page">
    <div class="error-page__code">404</div>
    <h1 class="error-page__title">This island doesn't exist</h1>
    <p class="error-page__desc">
      The page you're looking for has drifted out to sea. Let's get you back to paradise.
    </p>
    <a href="index.html" class="btn btn--primary">
      <span class="btn__text">Return Home</span>
      <span class="btn__arrow">→</span>
    </a>
  </main>
</body>
</html>
