<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Planet Holidays</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>">
  
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-page__code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: rgba(200, 169, 126, 0.15);
      margin-bottom: -1rem;
    }
    .error-page__title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      color: #f5f0eb;
      margin-bottom: 1rem;
    }
    .error-page__text {
      font-family: 'Inter', sans-serif;
      color: #a09890;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-page__code">404</div>
    <h1 class="error-page__title">Lost in paradise</h1>
    <p class="error-page__text">The page you're looking for has drifted away. Let's get you back to planning your dream getaway.</p>
    <a href="/" class="btn btn--primary">Back to Home</a>
  </div>
</body>
</html>
